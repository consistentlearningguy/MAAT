services:
  - type: web
    name: maat-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        value: sqlite:///data/db.sqlite
      - key: SYNC_INTERVAL_MINUTES
        value: "60"
      - key: ENABLE_INVESTIGATOR_MODE
        value: "true"
      - key: ENABLE_CLEAR_WEB_CONNECTORS
        value: "true"
      - key: ENABLE_PUBLIC_PROFILE_CHECKS
        value: "true"
