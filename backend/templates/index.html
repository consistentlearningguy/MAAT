{% extends "base.html" %}

{% block title %}Dashboard - OSINT Missing Persons Canada{% endblock %}

{% block content %}
<div class="flex flex-col h-full">
    <!-- Stats Bar -->
    <div id="statsBar" class="bg-dark-800 border-b border-gray-700 px-4 py-3">
        <div class="flex items-center space-x-6 text-sm">
            <div class="flex items-center space-x-2">
                <span class="text-gray-400">Total Active:</span>
                <span id="statTotal" class="text-white font-bold text-lg">--</span>
            </div>
            <div class="flex items-center space-x-2">
                <span class="text-gray-400">Recent (30d):</span>
                <span id="statRecent" class="text-yellow-400 font-bold">--</span>
            </div>
            <div class="flex items-center space-x-2">
                <span class="text-gray-400">Amber Alerts:</span>
                <span id="statAmber" class="text-orange-500 font-bold">--</span>
            </div>
            <div class="flex items-center space-x-2">
                <span class="text-gray-400">Faces Indexed:</span>
                <span id="statFaces" class="text-purple-400 font-bold">--</span>
            </div>
            <div class="border-l border-gray-600 h-6"></div>
            <!-- Filters -->
            <div class="flex items-center space-x-3">
                <select id="filterProvince" onchange="applyFilters()" class="bg-dark-700 border border-gray-600 rounded px-2 py-1 text-xs text-gray-200">
                    <option value="">All Provinces</option>
                    <option value="Alberta">Alberta</option>
                    <option value="BritishColumbia">British Columbia</option>
                    <option value="Manitoba">Manitoba</option>
                    <option value="NewBrunswick">New Brunswick</option>
                    <option value="NewfoundlandandLabrador">Newfoundland &amp; Labrador</option>
                    <option value="NT">Northwest Territories</option>
                    <option value="NovaScotia">Nova Scotia</option>
                    <option value="NU">Nunavut</option>
                    <option value="Ontario">Ontario</option>
                    <option value="PrinceEdwardIsland">Prince Edward Island</option>
                    <option value="Quebec">Quebec</option>
                    <option value="Saskatchewan">Saskatchewan</option>
                    <option value="YT">Yukon</option>
                </select>
                <select id="filterStatus" onchange="applyFilters()" class="bg-dark-700 border border-gray-600 rounded px-2 py-1 text-xs text-gray-200">
                    <option value="">All Types</option>
                    <option value="missing">Missing</option>
                    <option value="vulnerable">Vulnerable</option>
                    <option value="abudction">Abduction</option>
                    <option value="amberalert">Amber Alert</option>
                    <option value="childsearchalert">Child Search Alert</option>
                </select>
                <input id="filterSearch" type="text" placeholder="Search name or city..."
                       onkeyup="debounceSearch()" 
                       class="bg-dark-700 border border-gray-600 rounded px-2 py-1 text-xs text-gray-200 w-48">
            </div>
        </div>
    </div>

    <!-- Main split layout -->
    <div class="flex flex-1 overflow-hidden">
        <!-- Case list panel (left) -->
        <div id="caseListPanel" class="w-96 bg-dark-800 border-r border-gray-700 overflow-y-auto flex-shrink-0">
            <div id="caseList" class="p-2 space-y-2">
                <div class="text-center text-gray-500 py-8">Loading cases...</div>
            </div>
            <div id="loadMore" class="p-3 text-center hidden">
                <button onclick="loadMoreCases()" class="px-4 py-2 bg-dark-700 hover:bg-gray-600 rounded text-xs text-gray-300 transition">
                    Load More
                </button>
            </div>
        </div>

        <!-- Map (right) -->
        <div class="flex-1">
            <div id="map" class="w-full h-full"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', () => {
        initDashboard();
    });
</script>
{% endblock %}
