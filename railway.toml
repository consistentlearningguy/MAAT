[build]
builder = "nixpacks"

[build.nixpacks]
# cmake and gcc are required for building dlib (used by face-recognition)
aptPkgs = ["cmake", "build-essential", "libopenblas-dev", "liblapack-dev"]

[deploy]
startCommand = "python -m uvicorn backend.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
